services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: oz-ai-backend
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Oz AI
      APP_VERSION: 0.1.0
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: sqlite:////app/data/oz_ai.db
      UPLOAD_DIR: storage/uploads
      MAX_UPLOAD_SIZE_BYTES: 52428800
    volumes:
      - oz-ai-data:/app/data
      - oz-ai-uploads:/app/storage/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: oz-ai-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  oz-ai-data:
  oz-ai-uploads:
